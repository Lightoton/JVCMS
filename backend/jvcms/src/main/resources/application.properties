# Application Name
spring.application.name=jvcms

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/jvcms_db
spring.datasource.username=jvcms_user
spring.datasource.password=jvcms_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA Configuration
# update - automatically creates/updates database tables based on entities.
# For production, it is recommended to use migration tools (Flyway/Liquibase).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Log SQL statements (disabled for production performance)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
jwt.secret=${JWT_SECRET:please_change_this_secret_in_production_to_a_long_random_string_1234567890}
jwt.expiration=86400000

# Media Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads

# HTTP Response Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
server.compression.min-response-size=1024