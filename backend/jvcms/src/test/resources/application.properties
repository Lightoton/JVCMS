# Test Application Properties
spring.application.name=jvcms-test

# Use H2 or just rely on mocked services
# For JPA slice tests if any:
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT Configuration (STRONG 32-byte SECRET FOR TESTS)
jwt.secret=this_is_a_very_strong_secret_key_for_testing_purposes_only_12345
jwt.expiration=86400000

# Media Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=target/test-uploads
